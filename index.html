<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Prayer Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- 1. CSS RESET & VARIABLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-card: #2b1d20;
            --border-card: #4f2a32;
            --header-bg: rgba(0,0,0,0.2);
            --text-primary: #ffffff;
            --text-secondary: #ffccd5;
            --text-accent: #ff8fa3; 
            --highlight-bg: #782a3b;
            --input-bg: rgba(255,255,255,0.1);
            --font-main: 'Roboto', sans-serif;
        }

        /* THEMES */
        [data-theme="pink"] { --bg-card: #581c33; --border-card: #7a2646; --highlight-bg: #8f2d52; --text-secondary: #ffccd5; --text-accent: #ff9eb5; }
        [data-theme="purple"] { --bg-card: #2e1a47; --border-card: #4a2b70; --highlight-bg: #5e3691; --text-secondary: #dcd0ff; --text-accent: #c4a6ff; }
        [data-theme="red"] { --bg-card: #3d0e0e; --border-card: #5e2222; --highlight-bg: #7a1f1f; --text-secondary: #ffcccc; --text-accent: #ff8888; }
        [data-theme="orange"] { --bg-card: #42210b; --border-card: #663614; --highlight-bg: #8f4718; --text-secondary: #ffdec7; --text-accent: #ffb380; }
        [data-theme="yellow"] { --bg-card: #3d360e; --border-card: #615619; --highlight-bg: #85751f; --text-secondary: #fff8cc; --text-accent: #ffe666; }
        [data-theme="green"] { --bg-card: #13381e; --border-card: #225e34; --highlight-bg: #2d7a44; --text-secondary: #ccffda; --text-accent: #88ffaa; }
        [data-theme="cyan"] { --bg-card: #0e333d; --border-card: #1d5666; --highlight-bg: #24768a; --text-secondary: #ccf7ff; --text-accent: #66eeff; }
        [data-theme="blue"] { --bg-card: #111e3d; --border-card: #213666; --highlight-bg: #2b498a; --text-secondary: #ccd9ff; --text-accent: #88aaff; }
        [data-theme="brown"] { --bg-card: #3d2b1e; --border-card: #5e4430; --highlight-bg: #7a583e; --text-secondary: #ffeacc; --text-accent: #ffcc99; }
        [data-theme="grey"] { --bg-card: #262626; --border-card: #404040; --highlight-bg: #595959; --text-secondary: #e0e0e0; --text-accent: #aaaaaa; }
        [data-theme="black"] { --bg-card: #000000; --border-card: #333333; --highlight-bg: #333333; --text-secondary: #cccccc; --text-accent: #999999; }
        [data-theme="white"] { --bg-card: #ffffff; --border-card: #e0e0e0; --highlight-bg: #e0e0e0; --text-secondary: #666666; --text-primary: #222; --text-accent: #333; --input-bg: rgba(0,0,0,0.05); }

        [lang="ar"] { --font-main: 'Cairo', sans-serif; }

        body {
            background-color: transparent;
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
        }

        .widget-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            min-height: 340px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            overflow: visible;
            transition: background 0.3s;
            position: relative;
        }

        .header-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 10px 20px;
            background-color: var(--header-bg);
            direction: ltr; 
            height: 90px;
            overflow: hidden;
        }

        .header-item { display: flex; flex-direction: column; justify-content: center; }
        .align-start { align-items: flex-start; text-align: left; }
        .align-end { align-items: flex-end; text-align: right; }
        .align-center { align-items: center; text-align: center; }

        .label-text { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; height: 14px; white-space: nowrap; }
        .main-text { font-size: 1.1rem; font-weight: bold; line-height: 1.2; }

        /* FLOATING HEADER ICONS */
        .header-icons {
            display: flex;
            gap: 5px;
            align-items: center;
            justify-content: center;
            margin: 0 10px;
        }

        .header-icons img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            animation: floating 3s ease-in-out infinite;
        }

        /* Staggered animation for icons */
        .header-icons img:nth-child(1) { animation-delay: 0s; }
        .header-icons img:nth-child(2) { animation-delay: 0.2s; }
        .header-icons img:nth-child(3) { animation-delay: 0.4s; }
        .header-icons img:nth-child(4) { animation-delay: 0.6s; }
        .header-icons img:nth-child(5) { animation-delay: 0.8s; }

        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .date-row {
            text-align: center;
            padding: 12px 10px; 
            background-color: var(--header-bg);
            border-bottom: 1px solid var(--border-card);
            height: auto; 
            min-height: 85px; 
            display: flex;
            flex-direction: column; 
            align-items: center;
            justify-content: center;
        }
        
        .date-hijri { font-size: 1.1rem; font-weight: 700; color: var(--text-accent); margin-bottom: 8px; line-height: 1.2; display: block; }
        .date-greg { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; line-height: 1.2; display: block; opacity: 0.9; margin-bottom: 5px; }

        .prayer-bar { display: flex; overflow-x: auto; background-color: rgba(0,0,0,0.1); scrollbar-width: none; direction: ltr; height: 75px; }
        .prayer-bar::-webkit-scrollbar { display: none; }

        .prayer-item { flex: 1; min-width: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid var(--border-card); gap: 6px; }
        .prayer-item:last-child { border-right: none; }
        .prayer-item.active { background-color: var(--highlight-bg); font-weight: bold; }
        .p-name { font-size: 0.75rem; color: var(--text-secondary); margin: 0; line-height: 1; }
        .p-time { font-size: 1rem; font-weight: bold; direction: ltr; line-height: 1; }

        .controls-row { padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border-card); direction: ltr; flex-grow: 1; justify-content: center; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-label { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 8px; text-align: center; display: block; line-height: 1; }
        .inputs-row { display: flex; gap: 15px; width: 100%; }
        .input-box { background: var(--input-bg); border: 1px solid var(--border-card); color: var(--text-primary); border-radius: 6px; font-family: inherit; font-size: 0.9rem; outline: none; text-align: center; width: 100%; height: 38px; line-height: 38px; cursor: pointer; }
        
        .tools { display: flex; justify-content: center; align-items: center; width: 100%; gap: 25px; position: relative; height: 35px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--text-secondary); transition: 0.2s; padding: 0; line-height: 1; }
        .lang-btn { background: var(--input-bg); border: 1px solid var(--border-card); color: var(--text-primary); padding: 0; width: 50px; height: 28px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .color-popup {
            display: none;
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translateX(30px);
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            z-index: 200;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); transition: transform 0.2s; position: relative; }
        .color-dot:hover { transform: scale(1.2); border-color: #fff; }
        .color-dot:hover::after {
            content: attr(data-name);
            position: absolute;
            bottom: 140%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #000;
            color: #fff;
            padding: 4px 8px;
            font-size: 11px;
            border-radius: 4px;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid #555;
            z-index: 300;
        }

        #audio-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; pointer-events: none; opacity: 0; transition: opacity 0.5s; }
    </style>
</head>
<body>

    <audio id="adhan-audio" src="https://www.islamcan.com/audio/adhan/azan1.mp3" preload="auto"></audio>
    <div id="audio-hint">Sound Enabled</div>

    <div class="widget-card">
        <div class="header-row">
            <div class="header-item align-start">
                <span class="label-text" id="lbl-next">Next Prayer</span>
                <span class="main-text" id="countdown">--:--:--</span>
            </div>
            <div class="header-item align-center">
                <!-- FLOATING ICONS REPLACE MOSQUE -->
                <div class="header-icons">
                    <img src="https://cdn-icons-png.flaticon.com/128/2918/2918211.png">
                    <img src="https://cdn-icons-png.flaticon.com/128/1717/1717468.png">
                    <img src="https://cdn-icons-png.flaticon.com/128/10203/10203988.png">
                    <img src="https://cdn-icons-png.flaticon.com/128/13779/13779449.png">
                    <img src="https://cdn-icons-png.flaticon.com/128/7321/7321062.png">
                </div>
            </div>
            <div class="header-item align-end">
                <span class="label-text" id="city-display">...</span>
                <span class="main-text" id="clock">00:00</span>
            </div>
        </div>

        <div class="date-row">
            <div class="date-text" id="date-display">Loading...</div>
        </div>

        <div class="prayer-bar" id="prayers-container"></div>

        <div class="controls-row">
            <div class="inputs-row">
                <div class="input-group">
                    <span class="input-label" id="lbl-city">Choose City</span>
                    <select id="input-city" class="input-box" onchange="updateLoc()"></select>
                </div>
                <div class="input-group">
                    <span class="input-label" id="lbl-country">Choose Country</span>
                    <select id="input-country" class="input-box" onchange="changeCountry()">
                        <option value="Algeria">Algeria</option>
                        <option value="Palestine">Palestine</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Morocco">Morocco</option>
                        <option value="Tunisia">Tunisia</option>
                        <option value="France">France</option>
                        <option value="US">USA</option>
                        <option value="UK">UK</option>
                        <option value="Turkey">Turkey</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Malaysia">Malaysia</option>
                    </select>
                </div>
            </div>

            <div class="tools">
                <button class="icon-btn" onclick="toggleSound()" id="btn-sound" style="opacity: 0.5;">🔇</button>
                <button class="lang-btn" onclick="toggleLang()" id="btn-lang">EN</button>
                <button class="icon-btn" onclick="toggleColors()">🎨</button>
                <div class="color-popup" id="color-menu">
                    <div class="color-dot" data-name="Pink" style="background:#581c33" onclick="setTheme('pink')"></div>
                    <div class="color-dot" data-name="Purple" style="background:#2e1a47" onclick="setTheme('purple')"></div>
                    <div class="color-dot" data-name="Red" style="background:#3d0e0e" onclick="setTheme('red')"></div>
                    <div class="color-dot" data-name="Orange" style="background:#42210b" onclick="setTheme('orange')"></div>
                    <div class="color-dot" data-name="Yellow" style="background:#85751f" onclick="setTheme('yellow')"></div>
                    <div class="color-dot" data-name="Green" style="background:#13381e" onclick="setTheme('green')"></div>
                    <div class="color-dot" data-name="Cyan" style="background:#0e333d" onclick="setTheme('cyan')"></div>
                    <div class="color-dot" data-name="Blue" style="background:#111e3d" onclick="setTheme('blue')"></div>
                    <div class="color-dot" data-name="Brown" style="background:#3d2b1e" onclick="setTheme('brown')"></div>
                    <div class="color-dot" data-name="Grey" style="background:#595959" onclick="setTheme('grey')"></div>
                    <div class="color-dot" data-name="Black" style="background:#000" onclick="setTheme('black')"></div>
                    <div class="color-dot" data-name="White" style="background:#fff" onclick="setTheme('white')"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const widgetId = urlParams.get('id') || 'default';

        function getStorage(key) { try { return localStorage.getItem(widgetId + '_' + key); } catch(e) { return null; } }
        function setStorage(key, val) { try { localStorage.setItem(widgetId + '_' + key, val); } catch(e) {} }

        const COUNTRY_DATA = { "Algeria": ["Ain Oussera", "Algiers"], "Saudi Arabia": ["Makkah", "Madinah"], "Palestine": ["Gaza", "Jerusalem"], "Egypt": ["Cairo"], "Morocco": ["Rabat"], "Tunisia": ["Tunis"], "France": ["Paris"], "US": ["Washington"], "UK": ["London"], "Turkey": ["Ankara"], "Indonesia": ["Jakarta"], "Malaysia": ["Kuala Lumpur"] };
        const DICT_COUNTRIES = { "Algeria": "الجزائر", "Palestine": "فلسطين", "Saudi Arabia": "السعودية", "Egypt": "مصر", "Morocco": "المغرب", "Tunisia": "تونس", "France": "فرنسا", "US": "أمريكا", "UK": "بريطانيا", "Turkey": "تركيا", "Indonesia": "إندونيسيا", "Malaysia": "ماليزيا" };
        const DICT_CITIES = { "Ain Oussera": "عين وسارة", "Algiers": "الجزائر العاصمة", "Makkah": "مكة المكرمة", "Madinah": "المدينة المنورة", "Gaza": "غزة", "Jerusalem": "القدس", "Cairo": "القاهرة", "Rabat": "الرباط", "Tunis": "تونس العاصمة", "Paris": "باريس", "Washington": "واشنطن", "London": "لندن", "Ankara": "أنقرة", "Jakarta": "جاكرتا", "Kuala Lumpur": "كوالالمبور" };

        const COLOR_NAMES = {
            en: ["Pink", "Purple", "Red", "Orange", "Yellow", "Green", "Cyan", "Blue", "Brown", "Grey", "Black", "White"],
            ar: ["وردي", "بنفسجي", "أحمر", "برتقالي", "أصفر", "أخضر", "سماوي", "أزرق", "بني", "رمادي", "أسود", "أبيض"]
        };

        const state = {
            lang: getStorage('p_lang') || 'en',
            theme: getStorage('p_theme') || 'pink',
            sound: false,
            city: getStorage('p_city') || "Ain Oussera",
            country: getStorage('p_country') || "Algeria",
            timings: null, hijri: null, timezone: null, lastPlayedPrayer: ""
        };

        const TEXT = {
            en: { fajr: "Fajr", sunrise: "Sunrise", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha", next: "Next Prayer", loading: "Loading...", btn: "عربي", selCity: "Choose City", selCountry: "Choose Country" },
            ar: { fajr: "الفجر", sunrise: "الشروق", dhuhr: "الظهر", asr: "العصر", maghrib: "المغرب", isha: "العشاء", next: "الصلاة القادمة", loading: "جاري التحميل...", btn: "EN", selCity: "اختر المدينة", selCountry: "اختر الدولة" }
        };

        const audio = document.getElementById('adhan-audio');

        window.onload = () => {
            applyTheme(state.theme);
            populateCities(state.country);
            document.getElementById('input-country').value = state.country;
            document.getElementById('input-city').value = state.city;
            applyLang(state.lang);
            fetchData();
            setInterval(tick, 1000);
        };

        function changeCountry() {
            state.country = document.getElementById('input-country').value;
            setStorage('p_country', state.country);
            populateCities(state.country);
            state.city = document.getElementById('input-city').options[0].value;
            updateLoc();
        }

        function populateCities(country) {
            const citySelect = document.getElementById('input-city');
            citySelect.innerHTML = ""; 
            (COUNTRY_DATA[country] || ["Capital"]).forEach(city => {
                const opt = document.createElement('option');
                opt.value = city; opt.text = city; citySelect.appendChild(opt);
            });
        }

        async function fetchData() {
            try {
                const url = `https://api.aladhan.com/v1/timingsByCity?city=${state.city}&country=${state.country}&method=19`;
                const res = await fetch(url);
                const data = await res.json();
                if (data.code === 200) {
                    state.timings = data.data.timings;
                    state.hijri = data.data.date.hijri;
                    state.timezone = data.data.meta.timezone;
                    renderPrayerTimes(); renderDate(); tick();
                }
            } catch (e) { console.error(e); }
        }

        function getCurrentTimeInZone() {
            const now = new Date();
            if (!state.timezone) return { h: now.getHours(), m: now.getMinutes(), s: now.getSeconds() };
            const formatter = new Intl.DateTimeFormat('en-GB', { timeZone: state.timezone, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false });
            const parts = formatter.formatToParts(now);
            return { h: parseInt(parts.find(p => p.type === 'hour').value), m: parseInt(parts.find(p => p.type === 'minute').value), s: parseInt(parts.find(p => p.type === 'second').value) };
        }

        function tick() {
            const time = getCurrentTimeInZone();
            document.getElementById('clock').innerText = `${time.h.toString().padStart(2,'0')}:${time.m.toString().padStart(2,'0')}`;
            if(state.timings) updateCountdown(time);
        }

        function updateCountdown(time) {
            const prayers = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const curMins = time.h * 60 + time.m;
            let nextP = null; let nextName = "";
            for(let i=0; i<prayers.length; i++) {
                const [h, m] = state.timings[prayers[i]].split(':').map(Number);
                if((h * 60 + m) > curMins) { nextP = h * 60 + m; nextName = prayers[i]; break; }
            }
            if(!nextP) {
                const [h, m] = state.timings['Fajr'].split(':').map(Number);
                nextP = (h * 60 + m) + (24 * 60); nextName = 'Fajr';
            }
            document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`p-${nextName}`);
            if(activeEl) activeEl.classList.add('active');
            let diff = (nextP * 60) - (curMins * 60 + time.s);
            const hL = Math.floor(diff / 3600); diff %= 3600;
            const mL = Math.floor(diff / 60); const sL = diff % 60; 
            document.getElementById('countdown').innerText = `-${hL}:${mL<10?'0'+mL:mL}:${sL<10?'0'+sL:sL}`;
            document.getElementById('lbl-next').innerText = `${TEXT[state.lang].next}: ${TEXT[state.lang][nextName.toLowerCase()]}`;
        }

        function renderDate() {
            if(!state.hijri) return;
            const h = state.hijri; const el = document.getElementById('date-display'); const now = new Date();
            if (state.lang === 'en') {
                el.innerHTML = `<span class="date-hijri">${h.day} ${h.month.en}, ${h.year} AH</span><span class="date-greg">${now.toLocaleDateString('en-GB', { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' })}</span>`;
            } else {
                el.innerHTML = `<span class="date-hijri">\u200F${h.day} ${h.month.ar} ${h.year} هـ</span><span class="date-greg">${now.toLocaleDateString('ar-DZ', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })} م</span>`;
            }
        }

        function renderPrayerTimes() {
            const container = document.getElementById('prayers-container'); container.innerHTML = '';
            ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(k => {
                const div = document.createElement('div'); div.className = 'prayer-item'; div.id = `p-${k}`;
                div.innerHTML = `<span class="p-name">${TEXT[state.lang][k.toLowerCase()]}</span><span class="p-time">${state.timings[k].split(' ')[0]}</span>`;
                container.appendChild(div);
            });
        }

        function applyLang(l) {
            state.lang = l; setStorage('p_lang', l); document.documentElement.lang = l;
            document.getElementById('lbl-city').innerText = TEXT[l].selCity;
            document.getElementById('lbl-country').innerText = TEXT[l].selCountry;
            document.getElementById('btn-lang').innerText = TEXT[l].btn;
            document.getElementById('city-display').innerText = (l === 'ar' ? (DICT_CITIES[state.city] || state.city) : state.city);
            
            // TRANSLATE COLOR NAMES
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach((dot, index) => {
                dot.setAttribute('data-name', COLOR_NAMES[l][index]);
            });

            const countrySelect = document.getElementById('input-country');
            for (let i = 0; i < countrySelect.options.length; i++) {
                const engVal = countrySelect.options[i].value; 
                countrySelect.options[i].text = (l === 'ar' && DICT_COUNTRIES[engVal]) ? DICT_COUNTRIES[engVal] : engVal;
            }
            if(state.timings) { renderPrayerTimes(); renderDate(); }
        }

        function toggleLang() { applyLang(state.lang === 'en' ? 'ar' : 'en'); }

        function toggleSound() {
            state.sound = !state.sound;
            const btn = document.getElementById('btn-sound');
            btn.innerText = state.sound ? "🔊" : "🔇";
            btn.style.opacity = state.sound ? "1" : "0.5";
        }

        function toggleColors() { const m = document.getElementById('color-menu'); m.style.display = m.style.display === 'grid' ? 'none' : 'grid'; }

        function applyTheme(t) {
            state.theme = t; setStorage('p_theme', t);
            document.documentElement.setAttribute('data-theme', t);
            document.getElementById('color-menu').style.display = 'none';
        }
        function setTheme(t) { applyTheme(t); }

        function updateLoc() {
            state.city = document.getElementById('input-city').value;
            state.country = document.getElementById('input-country').value;
            setStorage('p_city', state.city);
            setStorage('p_country', state.country);
            document.getElementById('date-display').innerText = TEXT[state.lang].loading;
            fetchData();
        }
    </script>
</body>
