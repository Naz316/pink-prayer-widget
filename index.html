<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precise Prayer Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-card: #2b1d20; --border-card: #4f2a32; --header-bg: rgba(0,0,0,0.2);
            --text-primary: #ffffff; --text-secondary: #ffccd5; --text-accent: #ff8fa3; 
            --highlight-bg: #782a3b; --input-bg: rgba(255,255,255,0.1);
            --font-main: 'Roboto', sans-serif;
        }
        [data-theme="pink"] { --bg-card: #581c33; --border-card: #7a2646; --highlight-bg: #8f2d52; --text-secondary: #ffccd5; --text-accent: #ff9eb5; }
        [data-theme="purple"] { --bg-card: #2e1a47; --border-card: #4a2b70; --highlight-bg: #5e3691; --text-secondary: #dcd0ff; --text-accent: #c4a6ff; }
        [data-theme="red"] { --bg-card: #3d0e0e; --border-card: #5e2222; --highlight-bg: #7a1f1f; --text-secondary: #ffcccc; --text-accent: #ff8888; }
        [data-theme="orange"] { --bg-card: #42210b; --border-card: #663614; --highlight-bg: #8f4718; --text-secondary: #ffdec7; --text-accent: #ffb380; }
        [data-theme="yellow"] { --bg-card: #3d360e; --border-card: #615619; --highlight-bg: #85751f; --text-secondary: #fff8cc; --text-accent: #ffe666; }
        [data-theme="green"] { --bg-card: #13381e; --border-card: #225e34; --highlight-bg: #2d7a44; --text-secondary: #ccffda; --text-accent: #88ffaa; }
        [data-theme="cyan"] { --bg-card: #0e333d; --border-card: #1d5666; --highlight-bg: #24768a; --text-secondary: #ccf7ff; --text-accent: #66eeff; }
        [data-theme="blue"] { --bg-card: #111e3d; --border-card: #213666; --highlight-bg: #2b498a; --text-secondary: #ccd9ff; --text-accent: #88aaff; }
        [data-theme="brown"] { --bg-card: #3d2b1e; --border-card: #5e4430; --highlight-bg: #7a583e; --text-secondary: #ffeacc; --text-accent: #ffcc99; }
        [data-theme="grey"] { --bg-card: #262626; --border-card: #404040; --highlight-bg: #595959; --text-secondary: #e0e0e0; --text-accent: #aaaaaa; }
        [data-theme="black"] { --bg-card: #000000; --border-card: #333333; --highlight-bg: #333333; --text-secondary: #cccccc; --text-accent: #999999; }
        [data-theme="white"] { --bg-card: #ffffff; --border-card: #e0e0e0; --highlight-bg: #e0e0e0; --text-secondary: #666666; --text-primary: #222; --text-accent: #333; --input-bg: rgba(0,0,0,0.05); }

        [lang="ar"] { --font-main: 'Cairo', sans-serif; }

        body {
            background-color: transparent; font-family: var(--font-main);
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; color: var(--text-primary); overflow: hidden; user-select: none;
        }

        .widget-card {
            background-color: var(--bg-card); border: 1px solid var(--border-card);
            border-radius: 12px; width: 100%; max-width: 600px; min-height: 340px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column;
            position: relative;
        }

        .header-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 10px 20px; background-color: var(--header-bg); height: 90px; }
        .header-item { display: flex; flex-direction: column; justify-content: center; }
        .align-start { align-items: flex-start; text-align: left; }
        .align-end { align-items: flex-end; text-align: right; }
        .align-center { align-items: center; text-align: center; }

        .label-text { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; }
        .main-text { font-size: 1.1rem; font-weight: bold; }
        .mosque-icon { font-size: 2.5rem; opacity: 0.9; margin: 0 10px; }

        .date-row { text-align: center; padding: 12px 10px; background-color: var(--header-bg); border-bottom: 1px solid var(--border-card); min-height: 85px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .date-hijri { font-size: 1.1rem; font-weight: 700; color: var(--text-accent); display: block; margin-bottom: 5px; }
        .date-greg { font-size: 0.85rem; color: var(--text-secondary); display: block; }

        .prayer-bar { display: flex; overflow-x: auto; background-color: rgba(0,0,0,0.1); height: 75px; scrollbar-width: none; }
        .prayer-bar::-webkit-scrollbar { display: none; }
        .prayer-item { flex: 1; min-width: 60px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid var(--border-card); }
        .prayer-item:last-child { border-right: none; }
        .prayer-item.active { background-color: var(--highlight-bg); font-weight: bold; }
        .p-name { font-size: 0.75rem; color: var(--text-secondary); }
        .p-time { font-size: 1rem; font-weight: bold; }

        .controls-row { padding: 12px 20px; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border-card); flex-grow: 1; justify-content: center; }
        .inputs-row { display: flex; gap: 15px; width: 100%; }
        .input-group { display: flex; flex-direction: column; flex: 1; }
        .input-label { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 8px; text-align: center; }
        .input-box { background: var(--input-bg); border: 1px solid var(--border-card); color: var(--text-primary); border-radius: 6px; font-size: 0.9rem; text-align: center; width: 100%; height: 38px; cursor: pointer; }
        .input-box option { background: #333; color: #fff; }

        .tools { display: flex; justify-content: center; align-items: center; gap: 25px; height: 35px; }
        .icon-btn { background: none; border: none; cursor: pointer; font-size: 1.4rem; color: var(--text-secondary); transition: 0.2s; padding: 0; }
        .icon-btn:hover { color: var(--text-primary); transform: scale(1.1); }
        .lang-btn { background: var(--input-bg); border: 1px solid var(--border-card); color: var(--text-primary); width: 50px; height: 28px; border-radius: 4px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .color-popup { display: none; position: absolute; bottom: 45px; left: 50%; transform: translateX(30px); background: #222; border: 1px solid #444; border-radius: 6px; padding: 10px; z-index: 200; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
        .color-dot:hover { transform: scale(1.2); border-color: #fff; }

        #audio-hint { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; pointer-events: none; opacity: 0; transition: opacity 0.5s; z-index: 100; }
    </style>
</head>
<body>

    <!-- NEW AUDIO SOURCE: QuranicAudio (Secure & Fast) -->
    <audio id="adhan-audio" src="https://download.quranicaudio.com/misc/adhan/adhan_makkah.mp3" preload="auto"></audio>
    <div id="audio-hint">Sound Enabled</div>

    <div class="widget-card">
        <div class="header-row">
            <div class="header-item align-start">
                <span class="label-text" id="lbl-next">Next Prayer</span>
                <span class="main-text" id="countdown">--:--:--</span>
            </div>
            <div class="header-item align-center"><div class="mosque-icon">🕌</div></div>
            <div class="header-item align-end">
                <span class="label-text" id="city-display">...</span>
                <span class="main-text" id="clock">00:00</span>
            </div>
        </div>
        <div class="date-row"><div class="date-text" id="date-display">Loading...</div></div>
        <div class="prayer-bar" id="prayers-container"></div>
        <div class="controls-row">
            <div class="inputs-row">
                <div class="input-group">
                    <span class="input-label" id="lbl-city">Choose City</span>
                    <select id="input-city" class="input-box" onchange="updateLoc()"></select>
                </div>
                <div class="input-group">
                    <span class="input-label" id="lbl-country">Choose Country</span>
                    <select id="input-country" class="input-box" onchange="changeCountry()">
                        <option value="Algeria">Algeria</option>
                        <option value="Palestine">Palestine</option>
                        <option value="Saudi Arabia">Saudi Arabia</option>
                        <option value="Egypt">Egypt</option>
                        <option value="Morocco">Morocco</option>
                        <option value="Tunisia">Tunisia</option>
                        <option value="France">France</option>
                        <option value="US">USA</option>
                        <option value="UK">UK</option>
                        <option value="Turkey">Turkey</option>
                        <option value="Indonesia">Indonesia</option>
                        <option value="Malaysia">Malaysia</option>
                    </select>
                </div>
            </div>
            <div class="tools">
                <button class="icon-btn" onclick="toggleSound()" id="btn-sound" style="opacity: 0.5;">🔇</button>
                <button class="lang-btn" onclick="toggleLang()" id="btn-lang">EN</button>
                <button class="icon-btn" onclick="toggleColors()">🎨</button>
                <div class="color-popup" id="color-menu">
                    <div class="color-dot" style="background:#581c33" onclick="setTheme('pink')"></div>
                    <div class="color-dot" style="background:#2e1a47" onclick="setTheme('purple')"></div>
                    <div class="color-dot" style="background:#3d0e0e" onclick="setTheme('red')"></div>
                    <div class="color-dot" style="background:#42210b" onclick="setTheme('orange')"></div>
                    <div class="color-dot" style="background:#85751f" onclick="setTheme('yellow')"></div>
                    <div class="color-dot" style="background:#13381e" onclick="setTheme('green')"></div>
                    <div class="color-dot" style="background:#0e333d" onclick="setTheme('cyan')"></div>
                    <div class="color-dot" style="background:#111e3d" onclick="setTheme('blue')"></div>
                    <div class="color-dot" style="background:#3d2b1e" onclick="setTheme('brown')"></div>
                    <div class="color-dot" style="background:#595959" onclick="setTheme('grey')"></div>
                    <div class="color-dot" style="background:#000" onclick="setTheme('black')"></div>
                    <div class="color-dot" style="background:#fff" onclick="setTheme('white')"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- SAFE STORAGE HELPERS (Prevents Loading Crash) ---
        function getStorage(key) { try { return localStorage.getItem(key); } catch(e) { return null; } }
        function setStorage(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }

        // --- DATA SECTION ---
        const COUNTRY_DATA = {
            "Algeria": ["Ain Oussera", "Algiers"], "Saudi Arabia": ["Makkah", "Madinah"],
            "Palestine": ["Gaza", "Jerusalem"], "Egypt": ["Cairo"], "Morocco": ["Rabat"],
            "Tunisia": ["Tunis"], "France": ["Paris"], "US": ["Washington"],
            "UK": ["London"], "Turkey": ["Ankara"], "Indonesia": ["Jakarta"], "Malaysia": ["Kuala Lumpur"]
        };

        const DICT_COUNTRIES = {
            "Algeria": "الجزائر", "Palestine": "فلسطين", "Saudi Arabia": "السعودية",
            "Egypt": "مصر", "Morocco": "المغرب", "Tunisia": "تونس", "France": "فرنسا",
            "US": "أمريكا", "UK": "بريطانيا", "Turkey": "تركيا",
            "Indonesia": "إندونيسيا", "Malaysia": "ماليزيا"
        };
        
        const DICT_CITIES = {
            "Ain Oussera": "عين وسارة", "Algiers": "الجزائر العاصمة", "Makkah": "مكة المكرمة",
            "Madinah": "المدينة المنورة", "Gaza": "غزة", "Jerusalem": "القدس", "Cairo": "القاهرة",
            "Rabat": "الرباط", "Tunis": "تونس العاصمة", "Paris": "باريس", "Washington": "واشنطن",
            "London": "لندن", "Ankara": "أنقرة", "Jakarta": "جاكرتا", "Kuala Lumpur": "كوالالمبور"
        };

        // Initialize state using safe helpers
        const state = {
            lang: getStorage('p_lang') || 'en',
            theme: getStorage('p_theme') || 'pink',
            sound: false,
            city: "Ain Oussera",
            country: "Algeria",
            timings: null,
            hijri: null,
            timezone: null,
            lastPlayedPrayer: ""
        };

        const TEXT = {
            en: { fajr: "Fajr", sunrise: "Sunrise", dhuhr: "Dhuhr", asr: "Asr", maghrib: "Maghrib", isha: "Isha", next: "Next Prayer", loading: "Loading...", btn: "عربي", selCity: "Choose City", selCountry: "Choose Country" },
            ar: { fajr: "الفجر", sunrise: "الشروق", dhuhr: "الظهر", asr: "العصر", maghrib: "المغرب", isha: "العشاء", next: "الصلاة القادمة", loading: "جاري التحميل...", btn: "EN", selCity: "اختر المدينة", selCountry: "اختر الدولة" }
        };

        const audio = document.getElementById('adhan-audio');

        // --- INIT ---
        window.onload = () => {
            try {
                applyTheme(state.theme);
                const params = new URLSearchParams(window.location.search);
                if(params.get('country')) state.country = params.get('country');
                if(params.get('city')) state.city = params.get('city');

                // Force populate first to avoid empty dropdown crash
                populateCities(state.country);
                
                // Set dropdown values
                document.getElementById('input-country').value = state.country;
                
                // Safe City selection
                const citySel = document.getElementById('input-city');
                let cityExists = false;
                for(let i=0; i<citySel.options.length; i++) {
                    if(citySel.options[i].value === state.city) cityExists = true;
                }
                if(!cityExists && citySel.options.length > 0) state.city = citySel.options[0].value;
                citySel.value = state.city;

                applyLang(state.lang);
                fetchData();
                setInterval(tick, 1000);
            } catch (e) {
                console.error("Startup Error:", e);
                document.getElementById('date-display').innerText = "Startup Error";
            }
        };

        function populateCities(country) {
            const citySelect = document.getElementById('input-city');
            citySelect.innerHTML = "";
            const cities = COUNTRY_DATA[country] || ["Capital"];
            cities.forEach(city => {
                const opt = document.createElement('option');
                opt.value = city; opt.text = city; citySelect.appendChild(opt);
            });
            if(state.lang === 'ar') updateInputTexts('ar');
        }

        async function fetchData() {
            try {
                let engCity = state.city;
                let engCountry = state.country;

                const keyCity = Object.keys(DICT_CITIES).find(key => DICT_CITIES[key] === state.city);
                if(keyCity) engCity = keyCity;

                const keyCountry = Object.keys(DICT_COUNTRIES).find(key => DICT_COUNTRIES[key] === state.country);
                if(keyCountry) engCountry = keyCountry;

                const url = `https://api.aladhan.com/v1/timingsByCity?city=${engCity}&country=${engCountry}&method=19`;
                const res = await fetch(url);
                const data = await res.json();
                
                if(data.code === 200) {
                    state.timings = data.data.timings;
                    state.hijri = data.data.date.hijri;
                    state.timezone = data.data.meta.timezone;
                    renderPrayerTimes(); renderDate(); tick();
                } else {
                    document.getElementById('date-display').innerText = "Location Error";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('date-display').innerText = "Connection Error";
            }
        }

        function tick() {
            if(!state.timings || !state.timezone) return;
            const now = new Date();
            const formatter = new Intl.DateTimeFormat('en-GB', { timeZone: state.timezone, hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false });
            const parts = formatter.formatToParts(now);
            const h = parseInt(parts.find(p => p.type === 'hour').value);
            const m = parseInt(parts.find(p => p.type === 'minute').value);
            const s = parseInt(parts.find(p => p.type === 'second').value);
            
            document.getElementById('clock').innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            
            // Trigger Adhan
            const timeStr = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
            const prayers = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            for(let i=0; i<prayers.length; i++) {
                if(state.timings[prayers[i]] === timeStr && s < 2) playAdhan(prayers[i]);
            }

            // Countdown
            const curMins = h * 60 + m;
            let nextP = null; let nextName = "";
            for(let i=0; i<prayers.length; i++) {
                const [ph, pm] = state.timings[prayers[i]].split(':').map(Number);
                const pMins = ph * 60 + pm;
                if(pMins > curMins) { nextP = pMins; nextName = prayers[i]; break; }
            }
            if(!nextP) {
                const [ph, pm] = state.timings['Fajr'].split(':').map(Number);
                nextP = (ph * 60 + pm) + (24 * 60); nextName = 'Fajr';
            }

            // Visuals
            document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`p-${nextName}`)?.classList.add('active');
            
            let diffSecs = (nextP * 60) - (curMins * 60 + s);
            const hl = Math.floor(diffSecs / 3600); diffSecs %= 3600;
            const ml = Math.floor(diffSecs / 60);
            const sl = diffSecs % 60;
            
            document.getElementById('countdown').innerText = `-${hl}:${ml<10?'0'+ml:ml}:${sl<10?'0'+sl:sl}`;
            document.getElementById('lbl-next').innerText = `${TEXT[state.lang].next}: ${TEXT[state.lang][nextName.toLowerCase()]}`;
            
            if(hl > 0 || ml > 1) state.lastPlayedPrayer = "";
        }

        function playAdhan(pName) {
            if(state.sound && state.lastPlayedPrayer !== pName && pName !== 'Sunrise') {
                audio.volume = 1.0;
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Blocked:", e));
                state.lastPlayedPrayer = pName;
            }
        }

        function toggleSound() {
            const btn = document.getElementById('btn-sound');
            const hint = document.getElementById('audio-hint');
            
            if(!state.sound) {
                state.sound = true;
                btn.innerText = "🔊";
                btn.style.opacity = "1";
                hint.innerText = "Testing..."; 
                hint.style.opacity = "1";
                
                // Force play
                audio.volume = 1.0;
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setTimeout(() => { 
                            audio.pause(); 
                            audio.currentTime = 0; 
                            hint.innerText = "Sound Enabled";
                            setTimeout(() => hint.style.opacity = "0", 1500);
                        }, 3000);
                    }).catch(error => {
                        console.error("Playback failed", error);
                        hint.innerText = "Error: Browser Blocked";
                    });
                }
            } else {
                state.sound = false;
                btn.innerText = "🔇";
                btn.style.opacity = "0.5";
                audio.pause();
                audio.currentTime = 0;
                hint.style.opacity = "0";
            }
        }

        function changeCountry() {
            const val = document.getElementById('input-country').value;
            // Find English key if currently Arabic
            const keyCountry = Object.keys(DICT_COUNTRIES).find(key => DICT_COUNTRIES[key] === val);
            state.country = keyCountry || val;
            
            populateCities(state.country);
            state.city = document.getElementById('input-city').options[0].value;
            updateLoc();
        }
        function updateLoc() {
            state.city = document.getElementById('input-city').value;
            fetchData();
        }
        function toggleLang() { applyLang(state.lang === 'en' ? 'ar' : 'en'); }
        function applyLang(l) {
            state.lang = l; setStorage('p_lang', l); document.documentElement.lang = l;
            document.getElementById('btn-lang').innerText = TEXT[l].btn;
            document.getElementById('lbl-city').innerText = TEXT[l].selCity;
            document.getElementById('lbl-country').innerText = TEXT[l].selCountry;
            populateCities(state.country);
            document.getElementById('input-city').value = state.city;
            document.getElementById('input-country').value = state.country;
            if(state.timings) { renderPrayerTimes(); renderDate(); }
        }
        function renderPrayerTimes() {
            const c = document.getElementById('prayers-container'); c.innerHTML = '';
            ['Fajr','Sunrise','Dhuhr','Asr','Maghrib','Isha'].forEach(k => {
                const div = document.createElement('div'); div.className = 'prayer-item'; div.id = `p-${k}`;
                div.innerHTML = `<span class="p-name">${TEXT[state.lang][k.toLowerCase()]}</span><span class="p-time">${state.timings[k].split(' ')[0]}</span>`;
                c.appendChild(div);
            });
        }
        function renderDate() {
            const h = state.hijri; const el = document.getElementById('date-display');
            if(state.lang === 'en') el.innerHTML = `<span class="date-hijri">${h.day} ${h.month.en}, ${h.year} AH</span><span class="date-greg">${new Date().toLocaleDateString('en-GB', {weekday:'long',year:'numeric',month:'short',day:'numeric'})}</span>`;
            else el.innerHTML = `<span class="date-hijri">${h.day} ${h.month.ar} ${h.year} هـ</span><span class="date-greg">${new Date().toLocaleDateString('ar-DZ', {weekday:'long',year:'numeric',month:'long',day:'numeric'})} م</span>`;
        }
        function toggleColors() { document.getElementById('color-menu').style.display = document.getElementById('color-menu').style.display==='grid'?'none':'grid'; }
        function setTheme(t) { state.theme = t; setStorage('p_theme', t); document.documentElement.setAttribute('data-theme', t); document.getElementById('color-menu').style.display='none'; }
        function updateInputTexts(l) { 
            const co = document.getElementById('input-country').options;
            for(let i=0; i<co.length; i++) co[i].text = (l==='ar' && DICT_COUNTRIES[co[i].value]) ? DICT_COUNTRIES[co[i].value] : co[i].value;
            const ci = document.getElementById('input-city').options;
            for(let i=0; i<ci.length; i++) ci[i].text = (l==='ar' && DICT_CITIES[ci[i].value]) ? DICT_CITIES[ci[i].value] : ci[i].value;
        }
        function getKeyByValue(obj, val) { return Object.keys(obj).find(key => obj[key] === val); }
    </script>
</body>
</html>
