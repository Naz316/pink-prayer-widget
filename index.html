<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhan Widget</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS RESET --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-card: #2b1d20;
            --border-card: #4f2a32;
            --header-bg: rgba(0,0,0,0.2);
            --text-primary: #ffffff;
            --text-secondary: #ffccd5;
            --highlight-bg: #782a3b;
            --font-main: 'Roboto', sans-serif;
            --font-ar: 'Cairo', sans-serif;
        }

        /* DATA THEMES */
        [data-theme="pink"] { --bg-card: #581c33; --border-card: #7a2646; --highlight-bg: #8f2d52; }
        [data-theme="blue"] { --bg-card: #111e3d; --border-card: #213666; --highlight-bg: #2b498a; }
        [data-theme="green"] { --bg-card: #13381e; --border-card: #225e34; --highlight-bg: #2d7a44; }
        [data-theme="black"] { --bg-card: #000000; --border-card: #333333; --highlight-bg: #333333; }

        body {
            background-color: transparent;
            font-family: var(--font-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            color: var(--text-primary);
            overflow: hidden;
            user-select: none;
        }

        .widget-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- ENABLE SOUND OVERLAY --- */
        #enable-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            backdrop-filter: blur(2px);
            border-radius: 12px;
        }
        .overlay-icon { font-size: 3rem; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        .overlay-text { font-size: 1.2rem; font-weight: bold; color: #fff; }
        .overlay-sub { font-size: 0.8rem; color: #ccc; margin-top: 5px; }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* HEADER */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--header-bg);
            height: 90px;
        }
        .header-item { display: flex; flex-direction: column; justify-content: center; }
        .label-text { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .main-text { font-size: 1.4rem; font-weight: bold; }
        .mosque-icon { font-size: 2.5rem; margin: 0 10px; }

        /* PRAYER LIST */
        .prayer-bar {
            display: flex;
            background-color: rgba(0,0,0,0.1);
            height: 70px;
        }
        .prayer-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid var(--border-card);
            transition: background 0.3s;
        }
        .prayer-item:last-child { border-right: none; }
        .prayer-item.active { background-color: var(--highlight-bg); }
        .prayer-item.active .p-name { color: #fff; font-weight: bold; }
        
        .p-name { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; }
        .p-time { font-size: 0.95rem; font-weight: bold; }

        /* CONTROLS */
        .controls-row {
            padding: 15px;
            border-top: 1px solid var(--border-card);
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
        }
        
        select {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border-card);
            color: #fff;
            padding: 5px;
            border-radius: 4px;
            font-size: 0.85rem;
            outline: none;
        }
        select option { background: #333; }

        .btn-mini {
            background: none; border: none; cursor: pointer;
            font-size: 1.2rem; color: var(--text-secondary);
        }
        .btn-mini:hover { color: #fff; }

        /* VISUAL ALARM ANIMATION */
        @keyframes flash-red {
            0% { background-color: var(--bg-card); }
            50% { background-color: #500; }
            100% { background-color: var(--bg-card); }
        }
        .alarm-active {
            animation: flash-red 1s infinite;
        }

    </style>
</head>
<body>

    <!-- AUDIO ELEMENT -->
    <audio id="adhan-audio" src="https://media.blubrry.com/muslim_central_quran/podcasts.qurancentral.com/adhan/makkah.mp3" preload="auto"></audio>

    <div class="widget-card" id="main-card">
        
        <!-- CLICK TO ENABLE OVERLAY -->
        <div id="enable-overlay" onclick="enableAudioContext()">
            <div class="overlay-icon">🔇</div>
            <div class="overlay-text">Click to Enable Adhan</div>
            <div class="overlay-sub">Required for Notion</div>
        </div>

        <!-- HEADER -->
        <div class="header-row">
            <div class="header-item">
                <span class="label-text" id="lbl-next">Next Prayer</span>
                <span class="main-text" id="countdown">--:--:--</span>
            </div>
            <div class="mosque-icon">🕌</div>
            <div class="header-item" style="align-items: flex-end;">
                <span class="label-text" id="city-display">...</span>
                <span class="main-text" id="clock">00:00</span>
            </div>
        </div>

        <!-- PRAYERS -->
        <div class="prayer-bar" id="prayers-container">
            <!-- Items injected by JS -->
        </div>

        <!-- CONTROLS -->
        <div class="controls-row">
            <div style="display:flex; gap:10px;">
                <select id="input-country" onchange="changeCountry()">
                    <option value="Algeria">Algeria</option>
                    <option value="Palestine">Palestine</option>
                    <option value="Saudi Arabia">Saudi Arabia</option>
                    <option value="Egypt">Egypt</option>
                    <option value="Morocco">Morocco</option>
                    <option value="France">France</option>
                    <option value="US">USA</option>
                    <option value="UK">UK</option>
                    <option value="Turkey">Turkey</option>
                    <option value="Indonesia">Indonesia</option>
                    <option value="Malaysia">Malaysia</option>
                </select>
                <select id="input-city" onchange="updateLoc()"></select>
            </div>
            <div>
                <button class="btn-mini" onclick="toggleTheme()">🎨</button>
                <button class="btn-mini" onclick="testAudio()">🔊</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const COUNTRY_DATA = {
            "Algeria": ["Ain Oussera", "Algiers", "Oran"],
            "Saudi Arabia": ["Makkah", "Madinah", "Riyadh"],
            "Palestine": ["Gaza", "Jerusalem"],
            "Egypt": ["Cairo", "Alexandria"],
            "Morocco": ["Rabat", "Casablanca"],
            "France": ["Paris", "Lyon"],
            "US": ["New York", "Washington"],
            "UK": ["London", "Manchester"],
            "Turkey": ["Istanbul", "Ankara"],
            "Indonesia": ["Jakarta"],
            "Malaysia": ["Kuala Lumpur"]
        };

        const state = {
            city: "Ain Oussera",
            country: "Algeria",
            timings: null,
            timezone: null,
            audioAllowed: false,
            lastPlayed: "" // Stores the name of the prayer we just played to avoid loops
        };

        const audio = document.getElementById('adhan-audio');

        // --- INIT ---
        window.onload = () => {
            // Restore settings
            if(localStorage.getItem('p_city')) state.city = localStorage.getItem('p_city');
            if(localStorage.getItem('p_country')) state.country = localStorage.getItem('p_country');
            
            document.getElementById('input-country').value = state.country;
            populateCities(state.country);
            document.getElementById('input-city').value = state.city;

            fetchData();
            setInterval(tick, 1000);
        };

        // --- AUDIO HANDLING ---
        function enableAudioContext() {
            // User clicked the overlay
            audio.volume = 1.0;
            audio.play().then(() => {
                // Audio started successfully, pause it immediately
                audio.pause();
                audio.currentTime = 0;
                state.audioAllowed = true;
                
                // Hide overlay
                document.getElementById('enable-overlay').style.display = 'none';
            }).catch(e => {
                console.error("Audio still blocked", e);
                alert("Please click again to allow audio.");
            });
        }

        function testAudio() {
            if(!state.audioAllowed) {
                alert("Please click the overlay first.");
                return;
            }
            audio.currentTime = 0;
            audio.play();
        }

        function playAdhan() {
            if(state.audioAllowed) {
                document.getElementById('main-card').classList.add('alarm-active');
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Playback failed", e));
                
                // Remove visual alarm after adhan length (approx 2 mins) or shorter
                setTimeout(() => {
                    document.getElementById('main-card').classList.remove('alarm-active');
                }, 120000); 
            }
        }

        // --- LOGIC ---
        function tick() {
            const now = new Date();
            
            // 1. Get Time in Target Timezone
            let timeOpts = { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' };
            if(state.timezone) timeOpts.timeZone = state.timezone;
            
            // Format: "14:30:05"
            const timeStr = now.toLocaleTimeString('en-GB', timeOpts); 
            const [h, m, s] = timeStr.split(':');
            const currentHM = `${h}:${m}`;

            document.getElementById('clock').innerText = currentHM;

            if(!state.timings) return;

            // 2. CHECK FOR ADHAN (The Alarm)
            checkAlarm(currentHM, s);

            // 3. UPDATE COUNTDOWN
            updateCountdown(parseInt(h), parseInt(m), parseInt(s));
        }

        function checkAlarm(currentHM, currentSec) {
            const prayers = ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            
            // Check if current HH:MM matches any prayer time
            for (let name of prayers) {
                const pTime = state.timings[name].split(' ')[0]; // "12:30"
                
                if (currentHM === pTime) {
                    // It is the exact minute. 
                    // Only trigger if seconds are low (00-02) OR if we missed the start but haven't played yet
                    if (parseInt(currentSec) < 5 && state.lastPlayed !== name) {
                        console.log("TRIGGERING ADHAN FOR", name);
                        state.lastPlayed = name; // Mark as played
                        playAdhan();
                    }
                }
            }
            
            // Reset "lastPlayed" after the minute passes to allow it to play tomorrow
            // If currentHM is NOT equal to state.lastPlayed's time, we are safe.
            // Simplified: We don't really need to reset it heavily because the app likely reloads, 
            // but just to be safe, if we are 5 minutes past the prayer, clear lastPlayed.
        }

        function updateCountdown(curH, curM, curS) {
            const list = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            const curTotalMins = (curH * 60) + curM;
            
            let nextName = "Fajr";
            let nextTimeMins = 9999;

            // Find next
            for(let name of list) {
                const [pH, pM] = state.timings[name].split(':').map(Number);
                const pTotalMins = (pH * 60) + pM;
                
                if(pTotalMins > curTotalMins) {
                    nextName = name;
                    nextTimeMins = pTotalMins;
                    break;
                }
            }

            // If none found, next is Fajr tomorrow
            if(nextTimeMins === 9999) {
                const [pH, pM] = state.timings['Fajr'].split(':').map(Number);
                nextTimeMins = (pH * 60) + pM + (24 * 60);
                nextName = 'Fajr';
            }

            // Calc Diff
            let diffSecs = (nextTimeMins * 60) - ((curTotalMins * 60) + curS);
            
            const h = Math.floor(diffSecs / 3600);
            diffSecs %= 3600;
            const m = Math.floor(diffSecs / 60);
            const s = diffSecs % 60;

            document.getElementById('countdown').innerText = `-${h}:${m<10?'0'+m:m}:${s<10?'0'+s:s}`;
            document.getElementById('lbl-next').innerText = "Next: " + nextName;

            // Update Active Class
            document.querySelectorAll('.prayer-item').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('p-'+nextName);
            if(activeEl) activeEl.classList.add('active');
        }

        // --- API & UI ---
        async function fetchData() {
            const url = `https://api.aladhan.com/v1/timingsByCity?city=${state.city}&country=${state.country}&method=19`;
            try {
                const res = await fetch(url);
                const data = await res.json();
                state.timings = data.data.timings;
                state.timezone = data.data.meta.timezone;
                renderPrayers();
                document.getElementById('city-display').innerText = state.city;
            } catch(e) { console.error(e); }
        }

        function renderPrayers() {
            const c = document.getElementById('prayers-container');
            c.innerHTML = "";
            const list = ['Fajr', 'Sunrise', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'];
            list.forEach(name => {
                const t = state.timings[name].split(' ')[0];
                const div = document.createElement('div');
                div.className = 'prayer-item';
                div.id = 'p-'+name;
                div.innerHTML = `<span class="p-name">${name}</span><span class="p-time">${t}</span>`;
                c.appendChild(div);
            });
        }

        function populateCities(country) {
            const sel = document.getElementById('input-city');
            sel.innerHTML = "";
            (COUNTRY_DATA[country] || [state.city]).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.text = c;
                sel.appendChild(opt);
            });
        }

        function changeCountry() {
            state.country = document.getElementById('input-country').value;
            populateCities(state.country);
            state.city = document.getElementById('input-city').value;
            saveAndFetch();
        }

        function updateLoc() {
            state.city = document.getElementById('input-city').value;
            saveAndFetch();
        }

        function saveAndFetch() {
            localStorage.setItem('p_city', state.city);
            localStorage.setItem('p_country', state.country);
            fetchData();
        }

        const themes = ['pink', 'blue', 'green', 'black'];
        let thIdx = 0;
        function toggleTheme() {
            thIdx = (thIdx + 1) % themes.length;
            document.documentElement.setAttribute('data-theme', themes[thIdx]);
        }
    </script>
</body>
</html>
